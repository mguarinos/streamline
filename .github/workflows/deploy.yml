name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Queue deploys — never cancel a running deploy, let it finish first.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          SEMVER=${GITHUB_REF_NAME#v}
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "$SEMVER" > VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: VERSION
          retention-days: 1

  deploy-frontend:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: version-file
          path: frontend/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync versioned assets (long cache)
        run: |
          aws s3 sync frontend/ \
            s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html (no cache)
        run: |
          aws s3 cp frontend/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-lambda:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: version-file
          path: lambda/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - run: npm ci
        working-directory: lambda

      - run: npm run build
        working-directory: lambda

      - name: Prune devDependencies
        working-directory: lambda
        run: npm prune --production

      - name: Create deployment zip
        run: |
          cd lambda
          zip -r function.zip dist/ node_modules/ ../VERSION

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload function code
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --zip-file fileb://lambda/function.zip \
            --no-cli-pager

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION_NAME

      - name: Publish version, update alias, and summarise
        run: |
          LAMBDA_VERSION=$(aws lambda publish-version \
            --function-name $LAMBDA_FUNCTION_NAME \
            --description "${{ needs.prepare.outputs.semver }} (${{ needs.prepare.outputs.short_sha }})" \
            --query 'Version' \
            --output text)

          aws lambda update-alias \
            --function-name $LAMBDA_FUNCTION_NAME \
            --name live \
            --function-version $LAMBDA_VERSION

          echo "### Deployed ${{ needs.prepare.outputs.semver }}" >> $GITHUB_STEP_SUMMARY
          echo "Lambda version: $LAMBDA_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ needs.prepare.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Rollback: \`aws lambda update-alias --function-name $LAMBDA_FUNCTION_NAME --name live --function-version PREVIOUS_VERSION\`" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test
        run: |
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name $LAMBDA_FUNCTION_NAME \
            --qualifier live \
            --query 'FunctionUrl' \
            --output text)
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${FUNCTION_URL}api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: /api/health returned HTTP $STATUS" >&2
            exit 1
          fi
          echo "Smoke test passed: /api/health → $STATUS"
