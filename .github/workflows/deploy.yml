name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy frontend'
        type: boolean
        default: true
      deploy_lambda:
        description: 'Deploy Lambda'
        type: boolean
        default: true

# Queue deploys — never cancel a running deploy, let it finish first.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      lambda_changed: ${{ steps.changes.outputs.lambda }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SEMVER="manual-$(git rev-parse --short=7 HEAD)"
          else
            SEMVER=${GITHUB_REF_NAME#v}
          fi
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "$SEMVER" > VERSION

      - name: Detect changed paths
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "frontend=${{ inputs.deploy_frontend }}" >> $GITHUB_OUTPUT
            echo "lambda=${{ inputs.deploy_lambda }}" >> $GITHUB_OUTPUT
          else
            # Find the previous semver tag. If none exists (first release),
            # fall back to the initial commit so everything is treated as changed.
            PREV_TAG=$(git tag --sort=-version:refname \
              | grep -v "^${GITHUB_REF_NAME}$" \
              | head -1)

            if [ -z "$PREV_TAG" ]; then
              BASE=$(git rev-list --max-parents=0 HEAD)
              echo "No previous tag found — comparing against initial commit ($BASE)"
            else
              BASE="$PREV_TAG"
              echo "Comparing $BASE → $GITHUB_REF_NAME"
            fi

            CHANGED=$(git diff --name-only "$BASE"..HEAD)
            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -q "^frontend/"; then
              echo "frontend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED" | grep -q "^lambda/"; then
              echo "lambda=true" >> $GITHUB_OUTPUT
            else
              echo "lambda=false" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: VERSION
          retention-days: 1

  deploy-frontend:
    needs: prepare
    if: needs.prepare.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: version-file
          path: frontend/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync versioned assets (long cache)
        run: |
          aws s3 sync frontend/ \
            s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html (no cache)
        run: |
          aws s3 cp frontend/index.html \
            s3://${{ vars.S3_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-lambda:
    needs: prepare
    if: needs.prepare.outputs.lambda_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: version-file
          path: lambda/

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - run: npm ci
        working-directory: lambda

      - run: npm run build
        working-directory: lambda

      - name: Prune devDependencies
        working-directory: lambda
        run: npm prune --production

      - name: Create deployment zip
        run: |
          cd lambda
          zip -r function.zip dist/ node_modules/ ../VERSION

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload function code
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --zip-file fileb://lambda/function.zip \
            --no-cli-pager

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION_NAME

      - name: Publish version, update alias, and summarise
        run: |
          LAMBDA_VERSION=$(aws lambda publish-version \
            --function-name $LAMBDA_FUNCTION_NAME \
            --description "${{ needs.prepare.outputs.semver }} (${{ needs.prepare.outputs.short_sha }})" \
            --query 'Version' \
            --output text)

          aws lambda update-alias \
            --function-name $LAMBDA_FUNCTION_NAME \
            --name live \
            --function-version $LAMBDA_VERSION

          echo "### Deployed ${{ needs.prepare.outputs.semver }}" >> $GITHUB_STEP_SUMMARY
          echo "Lambda version: $LAMBDA_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ needs.prepare.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Rollback: \`aws lambda update-alias --function-name $LAMBDA_FUNCTION_NAME --name live --function-version PREVIOUS_VERSION\`" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test
        run: |
          DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: /api/health returned HTTP $STATUS" >&2
            exit 1
          fi
          echo "Smoke test passed: https://${DOMAIN}/api/health → $STATUS"

  notify-skipped:
    needs: [prepare, deploy-frontend, deploy-lambda]
    if: always() && needs.deploy-frontend.result == 'skipped' && needs.deploy-lambda.result == 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Log skipped deploy
        run: |
          echo "### Skipped deploy for ${{ needs.prepare.outputs.semver }}" >> $GITHUB_STEP_SUMMARY
          echo "No changes detected in frontend/ or lambda/ — nothing to deploy." >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ needs.prepare.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
