name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - run: npm ci
        working-directory: lambda

      - run: npm run lint
        working-directory: lambda

      - run: npm run build
        working-directory: lambda

      - name: Verify dist/index.js exists
        run: test -f lambda/dist/index.js

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Validate
        run: terraform -chdir=terraform validate

      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
